<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="gbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="500" fill="#0d1117"/>
  <!-- 标题 -->
  <rect x="0" y="0" width="960" height="40" fill="#161b22"/>
  <text x="480" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="bold" letter-spacing="1">NanoClaw Chatbot · 多端适配架构 &amp; Shared Core SDK</text>

  <!-- === Shared Core SDK 中心 === -->
  <rect x="330" y="170" width="300" height="170" rx="12" fill="#0c1e0c" stroke="#16a34a" stroke-width="2"/>
  <text x="480" y="195" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">Shared Core SDK</text>
  <text x="480" y="210" text-anchor="middle" fill="#86efac" font-size="8">跨端复用核心逻辑（TypeScript）</text>
  <!-- 内部模块 -->
  <rect x="344" y="218" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="384" y="232" text-anchor="middle" fill="#4ade80" font-size="8">API Client</text>
  <rect x="436" y="218" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="476" y="232" text-anchor="middle" fill="#4ade80" font-size="8">状态管理 Pinia</text>
  <rect x="528" y="218" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="568" y="232" text-anchor="middle" fill="#4ade80" font-size="8">Stream 解析器</text>

  <rect x="344" y="248" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="384" y="262" text-anchor="middle" fill="#4ade80" font-size="8">消息队列</text>
  <rect x="436" y="248" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="476" y="262" text-anchor="middle" fill="#4ade80" font-size="8">本地缓存 IndexedDB</text>
  <rect x="528" y="248" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="568" y="262" text-anchor="middle" fill="#4ade80" font-size="8">加密工具</text>

  <rect x="344" y="278" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="384" y="292" text-anchor="middle" fill="#4ade80" font-size="8">WebSocket 管理</text>
  <rect x="436" y="278" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="476" y="292" text-anchor="middle" fill="#4ade80" font-size="8">SSE 流式接收</text>
  <rect x="528" y="278" width="80" height="22" rx="4" fill="#14532d"/>
  <text x="568" y="292" text-anchor="middle" fill="#4ade80" font-size="8">事件总线</text>

  <rect x="344" y="308" width="264" height="22" rx="4" fill="#052e16"/>
  <text x="476" y="322" text-anchor="middle" fill="#22c55e" font-size="8">UI 组件库（Web Components / 适配层）</text>

  <!-- === 五端节点 === -->
  <!-- 微信小程序 -->
  <rect x="30" y="56" width="150" height="120" rx="10" fill="#0c1e3d" stroke="#2563eb" stroke-width="1.5"/>
  <text x="105" y="78" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">微信小程序</text>
  <text x="105" y="94" text-anchor="middle" fill="#60a5fa" font-size="8">Taro 3.x / UniApp</text>
  <rect x="42" y="102" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="113" text-anchor="middle" fill="#93c5fd" font-size="7">miniprogram-ci 持续集成</text>
  <rect x="42" y="120" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="131" text-anchor="middle" fill="#93c5fd" font-size="7">wx.onSocketMessage 消息接收</text>
  <rect x="42" y="138" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="149" text-anchor="middle" fill="#93c5fd" font-size="7">云开发 + 订阅消息推送</text>
  <text x="105" y="166" text-anchor="middle" fill="#3b82f6" font-size="7">⚠ 限制：无 DOM / 特殊 API</text>

  <!-- 原生 App -->
  <rect x="30" y="220" width="150" height="120" rx="10" fill="#0c1e3d" stroke="#2563eb" stroke-width="1.5"/>
  <text x="105" y="242" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">原生 App</text>
  <text x="105" y="258" text-anchor="middle" fill="#60a5fa" font-size="8">React Native / Flutter</text>
  <rect x="42" y="266" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="277" text-anchor="middle" fill="#93c5fd" font-size="7">JSI Bridge / Dart FFI</text>
  <rect x="42" y="284" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="295" text-anchor="middle" fill="#93c5fd" font-size="7">APNs + FCM 推送</text>
  <rect x="42" y="302" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="313" text-anchor="middle" fill="#93c5fd" font-size="7">本地 SQLite 消息缓存</text>
  <text x="105" y="330" text-anchor="middle" fill="#3b82f6" font-size="7">✓ 最优性能 · 完整能力</text>

  <!-- H5 -->
  <rect x="30" y="384" width="150" height="100" rx="10" fill="#0c1e3d" stroke="#2563eb" stroke-width="1.5"/>
  <text x="105" y="406" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">H5 移动端</text>
  <text x="105" y="422" text-anchor="middle" fill="#60a5fa" font-size="8">Vue3 + Vant</text>
  <rect x="42" y="430" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="441" text-anchor="middle" fill="#93c5fd" font-size="7">PWA Service Worker 离线</text>
  <rect x="42" y="448" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="105" y="459" text-anchor="middle" fill="#93c5fd" font-size="7">EventSource SSE 流式</text>
  <text x="105" y="476" text-anchor="middle" fill="#3b82f6" font-size="7">✓ 无需安装 · 快速分享</text>

  <!-- PC 客户端 -->
  <rect x="780" y="56" width="150" height="120" rx="10" fill="#0c1e3d" stroke="#2563eb" stroke-width="1.5"/>
  <text x="855" y="78" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">PC 客户端</text>
  <text x="855" y="94" text-anchor="middle" fill="#60a5fa" font-size="8">Electron + Vue3</text>
  <rect x="792" y="102" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="855" y="113" text-anchor="middle" fill="#93c5fd" font-size="7">Node.js 主进程 IPC</text>
  <rect x="792" y="120" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="855" y="131" text-anchor="middle" fill="#93c5fd" font-size="7">系统托盘 · 全局热键</text>
  <rect x="792" y="138" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="855" y="149" text-anchor="middle" fill="#93c5fd" font-size="7">本地文件读写 · 截图</text>
  <text x="855" y="166" text-anchor="middle" fill="#3b82f6" font-size="7">✓ 离线可用 · 系统集成</text>

  <!-- Web 浏览器 -->
  <rect x="780" y="220" width="150" height="120" rx="10" fill="#0c1e3d" stroke="#2563eb" stroke-width="1.5"/>
  <text x="855" y="242" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">Web 浏览器</text>
  <text x="855" y="258" text-anchor="middle" fill="#60a5fa" font-size="8">Nuxt3 SSR</text>
  <rect x="792" y="266" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="855" y="277" text-anchor="middle" fill="#93c5fd" font-size="7">SEO 友好 SSR 渲染</text>
  <rect x="792" y="284" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="855" y="295" text-anchor="middle" fill="#93c5fd" font-size="7">WebSocket 长连接</text>
  <rect x="792" y="302" width="126" height="14" rx="3" fill="#1e3a5f"/>
  <text x="855" y="313" text-anchor="middle" fill="#93c5fd" font-size="7">Markdown 渲染 · 代码高亮</text>
  <text x="855" y="330" text-anchor="middle" fill="#3b82f6" font-size="7">✓ 零安装 · 功能最完整</text>

  <!-- Web 浏览器 下方空间补充 -->
  <rect x="780" y="384" width="150" height="72" rx="10" fill="#0d1117" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="855" y="410" text-anchor="middle" fill="#475569" font-size="9" font-weight="bold">共同 UI 规范</text>
  <text x="855" y="426" text-anchor="middle" fill="#334155" font-size="7.5">Design Token 统一</text>
  <text x="855" y="442" text-anchor="middle" fill="#334155" font-size="7.5">Chat 组件可复用</text>

  <!-- 连线：各端 → SDK -->
  <!-- 微信小程序 右→ SDK左 -->
  <path d="M180,116 C250,116 280,200 330,220" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
  <!-- 原生 App 右→ SDK左 -->
  <path d="M180,280 C250,280 280,265 330,255" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
  <!-- H5 右→ SDK左 -->
  <path d="M180,424 C250,424 290,320 330,310" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
  <!-- PC 左← SDK右 -->
  <path d="M780,220 C730,220 700,220 630,220" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
  <!-- Web 左← SDK右 -->
  <path d="M780,280 C730,280 700,265 630,255" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrB)"/>

  <!-- SDK → BFF 向下 -->
  <line x1="480" y1="340" x2="480" y2="410" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <rect x="398" y="410" width="164" height="36" rx="8" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="430" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">NanoClaw BFF Gateway</text>
  <text x="480" y="442" text-anchor="middle" fill="#22c55e" font-size="7.5">统一接入端点 · https://api.chatbot.com</text>

  <!-- 图例 -->
  <rect x="330" y="458" width="300" height="28" rx="6" fill="#0d1117" stroke="#1f2937" stroke-width="1"/>
  <line x1="346" y1="473" x2="376" y2="473" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="382" y="477" fill="#64748b" font-size="8">使用 Shared Core SDK</text>
  <line x1="476" y1="473" x2="506" y2="473" stroke="#22c55e" stroke-width="2"/>
  <text x="512" y="477" fill="#64748b" font-size="8">SDK → BFF 调用</text>
</svg>
