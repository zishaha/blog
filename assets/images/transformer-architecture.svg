<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'Microsoft YaHei', sans-serif">
  <rect width="860" height="560" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#242424">Transformer 架构：编码器-解码器 vs GPT</text>

  <!-- ── LEFT: Encoder-Decoder ── -->
  <!-- Input -->
  <rect x="30" y="60" width="160" height="36" rx="8" fill="#fff" stroke="#1A8917" stroke-width="2"/>
  <text x="110" y="83" text-anchor="middle" font-size="13" fill="#1A8917" font-weight="bold">输入：我今天吃了一碗面</text>

  <line x1="110" y1="96" x2="110" y2="116" stroke="#999" stroke-width="1.5"/>
  <polygon points="104,112 110,122 116,112" fill="#999"/>

  <!-- Encoder box -->
  <rect x="30" y="122" width="160" height="200" rx="10" fill="#e8f5e9" stroke="#1A8917" stroke-width="2"/>
  <text x="110" y="143" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A8917">编码器 Encoder</text>

  <rect x="48" y="152" width="124" height="44" rx="6" fill="#fff" stroke="#1A8917"/>
  <text x="110" y="170" text-anchor="middle" font-size="11" fill="#242424">多头自注意力</text>
  <text x="110" y="185" text-anchor="middle" font-size="10" fill="#6B6B6B">Multi-Head Attention</text>

  <rect x="48" y="204" width="124" height="44" rx="6" fill="#fff" stroke="#1A8917"/>
  <text x="110" y="222" text-anchor="middle" font-size="11" fill="#242424">前馈网络</text>
  <text x="110" y="237" text-anchor="middle" font-size="10" fill="#6B6B6B">Feed Forward Network</text>

  <text x="110" y="268" text-anchor="middle" font-size="13" fill="#999">⋮ × N 层</text>
  <text x="110" y="312" text-anchor="middle" font-size="11" fill="#1A8917" font-weight="bold">↓ 语义向量输出</text>

  <!-- Arrow encoder → decoder -->
  <line x1="190" y1="222" x2="230" y2="222" stroke="#999" stroke-width="1.5"/>
  <polygon points="226,216 236,222 226,228" fill="#999"/>
  <text x="210" y="215" text-anchor="middle" font-size="10" fill="#6B6B6B">上下文</text>

  <!-- Decoder box -->
  <rect x="236" y="122" width="160" height="200" rx="10" fill="#f3e5f5" stroke="#764ba2" stroke-width="2"/>
  <text x="316" y="143" text-anchor="middle" font-size="14" font-weight="bold" fill="#764ba2">解码器 Decoder</text>

  <rect x="254" y="152" width="124" height="44" rx="6" fill="#fff" stroke="#764ba2"/>
  <text x="316" y="170" text-anchor="middle" font-size="11" fill="#242424">掩码自注意力</text>
  <text x="316" y="185" text-anchor="middle" font-size="10" fill="#6B6B6B">Masked Self-Attention</text>

  <rect x="254" y="204" width="124" height="44" rx="6" fill="#fff" stroke="#764ba2"/>
  <text x="316" y="222" text-anchor="middle" font-size="11" fill="#242424">交叉注意力</text>
  <text x="316" y="237" text-anchor="middle" font-size="10" fill="#6B6B6B">Cross Attention</text>

  <text x="316" y="268" text-anchor="middle" font-size="13" fill="#999">⋮ × N 层</text>
  <text x="316" y="312" text-anchor="middle" font-size="11" fill="#764ba2" font-weight="bold">↓ 预测下一个词</text>

  <!-- Output -->
  <line x1="316" y1="322" x2="316" y2="342" stroke="#999" stroke-width="1.5"/>
  <polygon points="310,338 316,348 322,338" fill="#999"/>
  <rect x="236" y="348" width="160" height="36" rx="8" fill="#fff" stroke="#764ba2" stroke-width="2"/>
  <text x="316" y="371" text-anchor="middle" font-size="12" fill="#764ba2" font-weight="bold">I ate a bowl of noodles.</text>

  <!-- Left label -->
  <text x="213" y="510" text-anchor="middle" font-size="12" fill="#6B6B6B">完整 Transformer（翻译任务）</text>

  <!-- ── RIGHT: GPT Decoder-only ── -->
  <rect x="460" y="60" width="370" height="460" rx="12" fill="#fff3e0" stroke="#e05c00" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="645" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#e05c00">GPT：仅解码器架构</text>
  <text x="645" y="108" text-anchor="middle" font-size="12" fill="#6B6B6B">无需编码器，直接自回归生成</text>

  <!-- Input -->
  <rect x="490" y="122" width="310" height="36" rx="8" fill="#fff" stroke="#e05c00" stroke-width="1.5"/>
  <text x="645" y="145" text-anchor="middle" font-size="13" fill="#e05c00" font-weight="bold">输入：帮我写一首关于春天的诗</text>

  <line x1="645" y1="158" x2="645" y2="178" stroke="#e05c00" stroke-width="1.5"/>
  <polygon points="639,174 645,184 651,174" fill="#e05c00"/>

  <!-- Tokenize -->
  <rect x="490" y="184" width="310" height="36" rx="8" fill="#ffe0b2" stroke="#e05c00"/>
  <text x="645" y="207" text-anchor="middle" font-size="12" fill="#242424">Token 化 → ["帮","我","写","一","首","关于","春天","的","诗"]</text>

  <line x1="645" y1="220" x2="645" y2="240" stroke="#e05c00" stroke-width="1.5"/>
  <polygon points="639,236 645,246 651,236" fill="#e05c00"/>

  <!-- Decoder stack -->
  <rect x="490" y="246" width="310" height="130" rx="8" fill="#fff" stroke="#e05c00" stroke-width="1.5"/>
  <text x="645" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#e05c00">Transformer Decoder × 96 层</text>
  <rect x="510" y="276" width="270" height="32" rx="5" fill="#ffe0b2"/>
  <text x="645" y="297" text-anchor="middle" font-size="11" fill="#242424">掩码自注意力（只看已生成的词）</text>
  <rect x="510" y="314" width="270" height="32" rx="5" fill="#ffe0b2"/>
  <text x="645" y="335" text-anchor="middle" font-size="11" fill="#242424">前馈网络（提取深层语义特征）</text>
  <text x="645" y="368" text-anchor="middle" font-size="10" fill="#6B6B6B">每层都在丰富每个 Token 的语义表示</text>

  <line x1="645" y1="376" x2="645" y2="396" stroke="#e05c00" stroke-width="1.5"/>
  <polygon points="639,392 645,402 651,392" fill="#e05c00"/>

  <!-- Probability -->
  <rect x="490" y="402" width="310" height="60" rx="8" fill="#fff" stroke="#e05c00" stroke-width="1.5"/>
  <text x="645" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#e05c00">词汇表概率分布（~10万个Token）</text>
  <text x="645" y="440" text-anchor="middle" font-size="11" fill="#242424">春(12%) 风(9%) 暖(7%) 绿(7%) 阳(5%) ...</text>
  <text x="645" y="455" text-anchor="middle" font-size="10" fill="#6B6B6B">采样最高概率词 → 加入输入 → 重复</text>

  <line x1="645" y1="462" x2="645" y2="482" stroke="#e05c00" stroke-width="1.5"/>
  <polygon points="639,478 645,488 651,478" fill="#e05c00"/>

  <!-- Output -->
  <rect x="490" y="488" width="310" height="22" rx="6" fill="#e05c00"/>
  <text x="645" y="504" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">春 → 风 → 吹 → 绿 → 江 → 南 → 岸 → ...</text>

  <!-- Right label -->
  <text x="645" y="540" text-anchor="middle" font-size="12" fill="#6B6B6B">GPT 文本生成（逐词自回归）</text>
</svg>
