<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Microsoft YaHei', sans-serif">
  <rect width="800" height="500" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#242424">Transformer 架构：编码器-解码器结构</text>

  <!-- Input -->
  <rect x="50" y="60" width="140" height="40" rx="8" fill="#fff" stroke="#1A8917" stroke-width="2"/>
  <text x="120" y="85" text-anchor="middle" font-size="14" fill="#1A8917" font-weight="bold">输入文本</text>
  <text x="120" y="115" text-anchor="middle" font-size="11" fill="#6B6B6B">我今天吃了一碗面</text>

  <!-- Arrow down -->
  <line x1="120" y1="120" x2="120" y2="150" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Encoder -->
  <g transform="translate(30, 150)">
    <rect width="180" height="240" rx="10" fill="#e8f5e9" stroke="#1A8917" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A8917">编码器 (Encoder)</text>

    <!-- Encoder layers -->
    <g transform="translate(20, 40)">
      <!-- Layer 1 -->
      <rect width="140" height="50" rx="6" fill="#fff" stroke="#1A8917"/>
      <text x="70" y="18" text-anchor="middle" font-size="11" fill="#242424">多头自注意力</text>
      <text x="70" y="32" text-anchor="middle" font-size="10" fill="#6B6B6B">Multi-Head Attention</text>
      <line x1="10" y1="50" x2="130" y2="50" stroke="#E6E6E6"/>
      <text x="70" y="45" text-anchor="middle" font-size="10" fill="#6B6B6B">+ 残差 & 归一化</text>

      <!-- Layer 2 -->
      <rect y="60" width="140" height="50" rx="6" fill="#fff" stroke="#1A8917"/>
      <text x="70" y="78" text-anchor="middle" font-size="11" fill="#242424">前馈网络</text>
      <text x="70" y="92" text-anchor="middle" font-size="10" fill="#6B6B6B">Feed Forward</text>
      <line x1="10" y1="110" x2="130" y2="110" stroke="#E6E6E6"/>
      <text x="70" y="105" text-anchor="middle" font-size="10" fill="#6B6B6B">+ 残差 & 归一化</text>

      <!-- More layers indicator -->
      <text x="70" y="135" text-anchor="middle" font-size="12" fill="#999">⋮</text>
      <text x="70" y="150" text-anchor="middle" font-size="10" fill="#6B6B6B">×N 层 (GPT-4: 96层)</text>
    </g>

    <text x="90" y="220" text-anchor="middle" font-size="11" fill="#1A8917" font-weight="bold">↓ 语义向量</text>
  </g>

  <!-- Arrow to decoder -->
  <line x1="210" y1="270" x2="280" y2="270" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="245" y="265" text-anchor="middle" font-size="10" fill="#6B6B6B">上下文</text>

  <!-- Decoder -->
  <g transform="translate(280, 150)">
    <rect width="180" height="240" rx="10" fill="#f3e5f5" stroke="#764ba2" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#764ba2">解码器 (Decoder)</text>

    <!-- Decoder layers -->
    <g transform="translate(20, 40)">
      <!-- Layer 1 -->
      <rect width="140" height="45" rx="6" fill="#fff" stroke="#764ba2"/>
      <text x="70" y="16" text-anchor="middle" font-size="11" fill="#242424">掩码自注意力</text>
      <text x="70" y="30" text-anchor="middle" font-size="10" fill="#6B6B6B">Masked Self-Attention</text>
      <text x="70" y="42" text-anchor="middle" font-size="9" fill="#999">只看已生成的词</text>

      <!-- Layer 2 -->
      <rect y="55" width="140" height="45" rx="6" fill="#fff" stroke="#764ba2"/>
      <text x="70" y="71" text-anchor="middle" font-size="11" fill="#242424">交叉注意力</text>
      <text x="70" y="85" text-anchor="middle" font-size="10" fill="#6B6B6B">Cross Attention</text>
      <text x="70" y="97" text-anchor="middle" font-size="9" fill="#999">关注编码器输出</text>

      <!-- Layer 3 -->
      <rect y="110" width="140" height="40" rx="6" fill="#fff" stroke="#764ba2"/>
      <text x="70" y="126" text-anchor="middle" font-size="11" fill="#242424">前馈网络</text>
      <text x="70" y="140" text-anchor="middle" font-size="10" fill="#6B6B6B">Feed Forward</text>

      <!-- More layers -->
      <text x="70" y="170" text-anchor="middle" font-size="12" fill="#999">⋮</text>
      <text x="70" y="185" text-anchor="middle" font-size="10" fill="#6B6B6B">×N 层</text>
    </g>

    <text x="90" y="220" text-anchor="middle" font-size="11" fill="#764ba2" font-weight="bold">↓ 预测下一个词</text>
  </g>

  <!-- Arrow down from decoder -->
  <line x1="370" y1="390" x2="370" y2="420" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="300" y="420" width="140" height="40" rx="8" fill="#fff" stroke="#764ba2" stroke-width="2"/>
  <text x="370" y="445" text-anchor="middle" font-size="14" fill="#764ba2" font-weight="bold">输出文本</text>
  <text x="370" y="475" text-anchor="middle" font-size="11" fill="#6B6B6B">I ate a bowl of noodles today.</text>

  <!-- Right side: GPT (Decoder-only) -->
  <g transform="translate(520, 60)">
    <rect width="240" height="400" rx="10" fill="#fff3e0" stroke="#e05c00" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="120" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#e05c00">GPT：仅解码器架构</text>
    <text x="120" y="45" text-anchor="middle" font-size="11" fill="#6B6B6B">只用 Decoder，不需要 Encoder</text>

    <!-- Input -->
    <rect x="50" y="60" width="140" height="35" rx="6" fill="#fff" stroke="#e05c00"/>
    <text x="120" y="82" text-anchor="middle" font-size="12" fill="#242424">帮我写一首诗</text>

    <line x1="120" y1="95" x2="120" y2="110" stroke="#e05c00" stroke-width="2" marker-end="url(#arrowhead2)"/>

    <!-- Decoder stack -->
    <rect x="30" y="110" width="180" height="180" rx="8" fill="#fff" stroke="#e05c00" stroke-width="2"/>
    <text x="120" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#e05c00">Transformer Decoder</text>

    <g transform="translate(50, 140)">
      <rect width="140" height="35" rx="5" fill="#ffe0b2" stroke="#e05c00"/>
      <text x="70" y="22" text-anchor="middle" font-size="11" fill="#242424">掩码自注意力 ×96层</text>

      <rect y="45" width="140" height="35" rx="5" fill="#ffe0b2" stroke="#e05c00"/>
      <text x="70" y="67" text-anchor="middle" font-size="11" fill="#242424">前馈网络 ×96层</text>

      <text x="70" y="100" text-anchor="middle" font-size="10" fill="#6B6B6B">每层都看之前生成的所有词</text>
      <text x="70" y="115" text-anchor="middle" font-size="10" fill="#6B6B6B">逐词预测，自回归生成</text>
    </g>

    <line x1="120" y1="290" x2="120" y2="305" stroke="#e05c00" stroke-width="2" marker-end="url(#arrowhead2)"/>

    <!-- Output -->
    <rect x="30" y="305" width="180" height="60" rx="6" fill="#fff" stroke="#e05c00" stroke-width="2"/>
    <text x="120" y="325" text-anchor="middle" font-size="11" fill="#e05c00" font-weight="bold">逐词生成输出</text>
    <text x="120" y="342" text-anchor="middle" font-size="10" fill="#242424">春 → 风 → 吹 → 绿 → 江 → 南</text>
    <text x="120" y="357" text-anchor="middle" font-size="10" fill="#242424">岸 → ...</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e05c00"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="400" y="495" text-anchor="middle" font-size="11" fill="#6B6B6B">左：完整 Transformer（翻译任务） | 右：GPT 架构（文本生成任务）</text>
</svg>
