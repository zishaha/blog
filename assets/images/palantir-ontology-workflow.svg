    </text>
    <text x="650" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      应用开发
    </text>

    <!-- Steps -->
    <rect x="570" y="160" width="160" height="100" rx="5" fill="white" stroke="#38ADA9" stroke-width="2"/>
    <text x="650" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#38ADA9">
      方式 1: Workshop
    </text>
    <text x="650" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 低代码构建
    </text>
    <text x="650" y="222" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 拖拽式界面
    </text>
    <text x="650" y="239" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 快速原型
    </text>

    <rect x="570" y="280" width="160" height="100" rx="5" fill="white" stroke="#38ADA9" stroke-width="2"/>
    <text x="650" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#38ADA9">
      方式 2: OSDK
    </text>
    <text x="650" y="325" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • TypeScript/Python
    </text>
    <text x="650" y="342" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 完全控制
    </text>
    <text x="650" y="359" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 专业开发
    </text>

    <rect x="570" y="400" width="160" height="80" rx="5" fill="white" stroke="#38ADA9" stroke-width="2"/>
    <text x="650" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#38ADA9">
      构建 UI 组件
    </text>
    <text x="650" y="445" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 表格、图表
    </text>
    <text x="650" y="462" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 表单、按钮
    </text>

    <rect x="570" y="500" width="160" height="60" rx="5" fill="white" stroke="#38ADA9" stroke-width="2"/>
    <text x="650" y="525" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#38ADA9">
      集成操作
    </text>
    <text x="650" y="545" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 调用 Actions
    </text>
  </g>

  <!-- Arrow 3 to 4 -->
  <line x1="760" y1="355" x2="790" y2="355" stroke="#666" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Phase 4: Deployment -->
  <g>
    <rect x="800" y="80" width="180" height="550" rx="10" fill="url(#phaseGradient4)" stroke="#FCE38A" stroke-width="2"/>
    <text x="890" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      阶段 4
    </text>
    <text x="890" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      部署运维
    </text>

    <!-- Steps -->
    <rect x="820" y="160" width="140" height="100" rx="5" fill="white" stroke="#F38181" stroke-width="2"/>
    <text x="890" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#F38181">
      部署选项
    </text>
    <text x="890" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • Foundry 托管
    </text>
    <text x="890" y="222" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 自托管
    </text>
    <text x="890" y="239" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 混合部署
    </text>

    <rect x="820" y="280" width="140" height="80" rx="5" fill="white" stroke="#F38181" stroke-width="2"/>
    <text x="890" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#F38181">
      版本管理
    </text>
    <text x="890" y="325" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • Git 集成
    </text>
    <text x="890" y="342" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 回滚能力
    </text>

    <rect x="820" y="380" width="140" height="80" rx="5" fill="white" stroke="#F38181" stroke-width="2"/>
    <text x="890" y="405" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#F38181">
      权限管理
    </text>
    <text x="890" y="425" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • RBAC
    </text>
    <text x="890" y="442" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 审计日志
    </text>

    <rect x="820" y="480" width="140" height="80" rx="5" fill="white" stroke="#F38181" stroke-width="2"/>
    <text x="890" y="505" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#F38181">
      监控告警
    </text>
    <text x="890" y="525" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 性能监控
    </text>
    <text x="890" y="542" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 错误追踪
    </text>
  </g>

  <!-- Bottom note -->
  <text x="500" y="670" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#666" font-style="italic">
    从数据建模到应用部署的完整工作流，每个阶段都有明确的交付物和验收标准
  </text>
</svg>
