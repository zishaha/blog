<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phaseGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EE5A6F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44A08D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#95E1D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ADA9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGradient4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F38181;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCE38A;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">
    本体驱动的应用构建流程
  </text>

  <!-- Phase 1: Data Modeling -->
  <g>
    <rect x="50" y="80" width="200" height="550" rx="10" fill="url(#phaseGradient1)" stroke="#EE5A6F" stroke-width="2"/>
    <text x="150" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      阶段 1
    </text>
    <text x="150" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      数据建模
    </text>

    <!-- Steps -->
    <rect x="70" y="160" width="160" height="100" rx="5" fill="white" stroke="#EE5A6F" stroke-width="2"/>
    <text x="150" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#EE5A6F">
      1. 识别业务实体
    </text>
    <text x="150" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 航班、飞机
    </text>
    <text x="150" y="222" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 机场、乘客
    </text>
    <text x="150" y="239" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 订单、产品
    </text>

    <rect x="70" y="280" width="160" height="80" rx="5" fill="white" stroke="#EE5A6F" stroke-width="2"/>
    <text x="150" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#EE5A6F">
      2. 定义对象类型
    </text>
    <text x="150" y="325" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 属性和类型
    </text>
    <text x="150" y="342" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 主键和索引
    </text>

    <rect x="70" y="380" width="160" height="80" rx="5" fill="white" stroke="#EE5A6F" stroke-width="2"/>
    <text x="150" y="405" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#EE5A6F">
      3. 建立关系
    </text>
    <text x="150" y="425" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 创建链接类型
    </text>
    <text x="150" y="442" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 定义基数
    </text>

    <rect x="70" y="480" width="160" height="80" rx="5" fill="white" stroke="#EE5A6F" stroke-width="2"/>
    <text x="150" y="505" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#EE5A6F">
      4. 映射数据源
    </text>
    <text x="150" y="525" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 字段映射
    </text>
    <text x="150" y="542" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 数据转换
    </text>
  </g>

  <!-- Arrow 1 to 2 -->
  <line x1="260" y1="355" x2="290" y2="355" stroke="#666" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Phase 2: Action Definition -->
  <g>
    <rect x="300" y="80" width="200" height="550" rx="10" fill="url(#phaseGradient2)" stroke="#44A08D" stroke-width="2"/>
    <text x="400" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      阶段 2
    </text>
    <text x="400" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      操作定义
    </text>

    <!-- Steps -->
    <rect x="320" y="160" width="160" height="100" rx="5" fill="white" stroke="#44A08D" stroke-width="2"/>
    <text x="400" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#44A08D">
      1. 识别业务流程
    </text>
    <text x="400" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 重新调度
    </text>
    <text x="400" y="222" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 取消航班
    </text>
    <text x="400" y="239" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 分配资源
    </text>

    <rect x="320" y="280" width="160" height="80" rx="5" fill="white" stroke="#44A08D" stroke-width="2"/>
    <text x="400" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#44A08D">
      2. 定义输入输出
    </text>
    <text x="400" y="325" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 参数类型
    </text>
    <text x="400" y="342" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 返回值
    </text>

    <rect x="320" y="380" width="160" height="80" rx="5" fill="white" stroke="#44A08D" stroke-width="2"/>
    <text x="400" y="405" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#44A08D">
      3. 编写业务逻辑
    </text>
    <text x="400" y="425" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • TypeScript/Python
    </text>
    <text x="400" y="442" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 调用外部 API
    </text>

    <rect x="320" y="480" width="160" height="80" rx="5" fill="white" stroke="#44A08D" stroke-width="2"/>
    <text x="400" y="505" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#44A08D">
      4. 配置权限
    </text>
    <text x="400" y="525" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 角色授权
    </text>
    <text x="400" y="542" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">
      • 审批流程
    </text>
  </g>

  <!-- Arrow 2 to 3 -->
  <line x1="510" y1="355" x2="540" y2="355" stroke="#666" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Phase 3: Application Development -->
  <g>
    <rect x="550" y="80" width="200" height="550" rx="10" fill="url(#phaseGradient3)" stroke="#38ADA9" stroke-width="2"/>
    <text x="650" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
