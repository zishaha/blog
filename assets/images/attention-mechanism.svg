<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Microsoft YaHei', sans-serif">
  <rect width="800" height="600" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#242424">注意力机制：同一个词，不同语境，不同理解</text>

  <!-- Sentence 1 -->
  <text x="40" y="68" font-size="13" fill="#6B6B6B">句子 1：</text>
  <rect x="40" y="76" width="720" height="44" rx="8" fill="#fff" stroke="#E6E6E6"/>
  <text x="60" y="104" font-size="15" fill="#242424">我很喜欢吃</text>
  <rect x="178" y="82" width="52" height="30" rx="6" fill="#1A8917" opacity="0.15"/>
  <text x="204" y="104" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A8917">苹果</text>
  <text x="238" y="104" font-size="15" fill="#242424">，又</text>
  <text x="278" y="104" font-size="15" fill="#e05c00">甜</text>
  <text x="296" y="104" font-size="15" fill="#242424">又</text>
  <text x="314" y="104" font-size="15" fill="#e05c00">脆</text>
  <text x="332" y="104" font-size="15" fill="#242424">。</text>
  <line x1="210" y1="112" x2="278" y2="112" stroke="#1A8917" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="210" y1="112" x2="322" y2="112" stroke="#1A8917" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="420" y="104" font-size="13" fill="#1A8917" font-weight="bold">→ 关注"甜"、"脆" → 水果 🍎</text>

  <!-- Sentence 2 -->
  <text x="40" y="148" font-size="13" fill="#6B6B6B">句子 2：</text>
  <rect x="40" y="156" width="720" height="44" rx="8" fill="#fff" stroke="#E6E6E6"/>
  <rect x="40" y="162" width="52" height="30" rx="6" fill="#764ba2" opacity="0.15"/>
  <text x="66" y="184" text-anchor="middle" font-size="15" font-weight="bold" fill="#764ba2">苹果</text>
  <text x="100" y="184" font-size="15" fill="#e05c00">公司</text>
  <text x="134" y="184" font-size="15" fill="#242424">发布了新款</text>
  <text x="234" y="184" font-size="15" fill="#e05c00">iPhone</text>
  <text x="300" y="184" font-size="15" fill="#242424">。</text>
  <line x1="74" y1="192" x2="116" y2="192" stroke="#764ba2" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="74" y1="192" x2="258" y2="192" stroke="#764ba2" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="420" y="184" font-size="13" fill="#764ba2" font-weight="bold">→ 关注"公司"、"iPhone" → 科技公司 💻</text>

  <!-- Divider -->
  <line x1="40" y1="222" x2="760" y2="222" stroke="#E6E6E6" stroke-width="1"/>

  <!-- Matrix section title -->
  <text x="400" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#242424">注意力权重矩阵（句子1中"苹果"关注哪些词）</text>
  <text x="400" y="266" text-anchor="middle" font-size="12" fill="#6B6B6B">颜色越深表示关注度越高</text>

  <!-- Matrix: origin at (130, 285) -->
  <!-- col headers: 我 吃 苹果 甜 脆  at x= 80+col*60 -->
  <!-- row headers at x=50 -->

  <!-- Column headers -->
  <text x="210" y="300" text-anchor="middle" font-size="13" fill="#6B6B6B">我</text>
  <text x="270" y="300" text-anchor="middle" font-size="13" fill="#6B6B6B">吃</text>
  <text x="330" y="300" text-anchor="middle" font-size="13" fill="#1A8917" font-weight="bold">苹果</text>
  <text x="390" y="300" text-anchor="middle" font-size="13" fill="#e05c00">甜</text>
  <text x="450" y="300" text-anchor="middle" font-size="13" fill="#e05c00">脆</text>

  <!-- Row headers -->
  <text x="160" y="325" text-anchor="middle" font-size="13" fill="#6B6B6B">我</text>
  <text x="160" y="375" text-anchor="middle" font-size="13" fill="#6B6B6B">吃</text>
  <text x="160" y="425" text-anchor="middle" font-size="13" fill="#1A8917" font-weight="bold">苹果</text>
  <text x="160" y="475" text-anchor="middle" font-size="13" fill="#e05c00">甜</text>
  <text x="160" y="525" text-anchor="middle" font-size="13" fill="#e05c00">脆</text>

  <!-- Row 我 (y=308) -->
  <rect x="182" y="308" width="54" height="32" rx="4" fill="#1A8917" opacity="0.75"/><text x="210" y="329" text-anchor="middle" font-size="12" fill="white">0.8</text>
  <rect x="242" y="308" width="54" height="32" rx="4" fill="#1A8917" opacity="0.10"/><text x="270" y="329" text-anchor="middle" font-size="12" fill="#888">0.1</text>
  <rect x="302" y="308" width="54" height="32" rx="4" fill="#1A8917" opacity="0.10"/><text x="330" y="329" text-anchor="middle" font-size="12" fill="#888">0.1</text>
  <rect x="362" y="308" width="54" height="32" rx="4" fill="#1A8917" opacity="0.03"/><text x="390" y="329" text-anchor="middle" font-size="12" fill="#bbb">0.0</text>
  <rect x="422" y="308" width="54" height="32" rx="4" fill="#1A8917" opacity="0.03"/><text x="450" y="329" text-anchor="middle" font-size="12" fill="#bbb">0.0</text>

  <!-- Row 吃 (y=358) -->
  <rect x="182" y="358" width="54" height="32" rx="4" fill="#1A8917" opacity="0.10"/><text x="210" y="379" text-anchor="middle" font-size="12" fill="#888">0.1</text>
  <rect x="242" y="358" width="54" height="32" rx="4" fill="#1A8917" opacity="0.40"/><text x="270" y="379" text-anchor="middle" font-size="12" fill="white">0.4</text>
  <rect x="302" y="358" width="54" height="32" rx="4" fill="#1A8917" opacity="0.50"/><text x="330" y="379" text-anchor="middle" font-size="12" fill="white">0.5</text>
  <rect x="362" y="358" width="54" height="32" rx="4" fill="#1A8917" opacity="0.10"/><text x="390" y="379" text-anchor="middle" font-size="12" fill="#888">0.1</text>
  <rect x="422" y="358" width="54" height="32" rx="4" fill="#1A8917" opacity="0.03"/><text x="450" y="379" text-anchor="middle" font-size="12" fill="#bbb">0.0</text>

  <!-- Row 苹果 (y=408) — highlight row -->
  <rect x="182" y="408" width="54" height="32" rx="4" fill="#1A8917" opacity="0.03"/><text x="210" y="429" text-anchor="middle" font-size="12" fill="#bbb">0.0</text>
  <rect x="242" y="408" width="54" height="32" rx="4" fill="#1A8917" opacity="0.30"/><text x="270" y="429" text-anchor="middle" font-size="12" fill="white">0.3</text>
  <rect x="302" y="408" width="54" height="32" rx="4" fill="#1A8917" opacity="0.20"/><text x="330" y="429" text-anchor="middle" font-size="12" fill="#555">0.2</text>
  <rect x="362" y="408" width="54" height="32" rx="4" fill="#1A8917" opacity="0.72"/><text x="390" y="429" text-anchor="middle" font-size="12" fill="white">0.7</text>
  <rect x="422" y="408" width="54" height="32" rx="4" fill="#1A8917" opacity="0.62"/><text x="450" y="429" text-anchor="middle" font-size="12" fill="white">0.6</text>
  <!-- Highlight border for 苹果 row -->
  <rect x="182" y="408" width="294" height="32" rx="4" fill="none" stroke="#1A8917" stroke-width="2"/>
  <text x="510" y="429" font-size="11" fill="#1A8917">← 苹果关注甜和脆</text>

  <!-- Row 甜 (y=458) -->
  <rect x="182" y="458" width="54" height="32" rx="4" fill="#1A8917" opacity="0.03"/><text x="210" y="479" text-anchor="middle" font-size="12" fill="#bbb">0.0</text>
  <rect x="242" y="458" width="54" height="32" rx="4" fill="#1A8917" opacity="0.20"/><text x="270" y="479" text-anchor="middle" font-size="12" fill="#555">0.2</text>
  <rect x="302" y="458" width="54" height="32" rx="4" fill="#1A8917" opacity="0.60"/><text x="330" y="479" text-anchor="middle" font-size="12" fill="white">0.6</text>
  <rect x="362" y="458" width="54" height="32" rx="4" fill="#1A8917" opacity="0.50"/><text x="390" y="479" text-anchor="middle" font-size="12" fill="white">0.5</text>
  <rect x="422" y="458" width="54" height="32" rx="4" fill="#1A8917" opacity="0.30"/><text x="450" y="479" text-anchor="middle" font-size="12" fill="white">0.3</text>

  <!-- Row 脆 (y=508) -->
  <rect x="182" y="508" width="54" height="32" rx="4" fill="#1A8917" opacity="0.03"/><text x="210" y="529" text-anchor="middle" font-size="12" fill="#bbb">0.0</text>
  <rect x="242" y="508" width="54" height="32" rx="4" fill="#1A8917" opacity="0.10"/><text x="270" y="529" text-anchor="middle" font-size="12" fill="#888">0.1</text>
  <rect x="302" y="508" width="54" height="32" rx="4" fill="#1A8917" opacity="0.50"/><text x="330" y="529" text-anchor="middle" font-size="12" fill="white">0.5</text>
  <rect x="362" y="508" width="54" height="32" rx="4" fill="#1A8917" opacity="0.30"/><text x="390" y="529" text-anchor="middle" font-size="12" fill="white">0.3</text>
  <rect x="422" y="508" width="54" height="32" rx="4" fill="#1A8917" opacity="0.72"/><text x="450" y="529" text-anchor="middle" font-size="12" fill="white">0.7</text>

  <!-- Legend -->
  <rect x="530" y="360" width="14" height="14" rx="3" fill="#1A8917" opacity="0.75"/><text x="550" y="372" font-size="11" fill="#555">高关注 (0.6~0.8)</text>
  <rect x="530" y="382" width="14" height="14" rx="3" fill="#1A8917" opacity="0.35"/><text x="550" y="394" font-size="11" fill="#555">中关注 (0.2~0.5)</text>
  <rect x="530" y="404" width="14" height="14" rx="3" fill="#1A8917" opacity="0.06"/><text x="550" y="416" font-size="11" fill="#555">低关注 (0.0~0.1)</text>

  <!-- Bottom note -->
  <text x="400" y="572" text-anchor="middle" font-size="11" fill="#aaa">"苹果"这一行：对"甜"(0.7)和"脆"(0.6)关注度最高 → 判断为水果语境</text>
</svg>
