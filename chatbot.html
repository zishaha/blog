<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoClaw Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #2f81f7;
      --accent-hover: #388bfd;
      --green: #3fb950;
    }

    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status.ready { color: var(--green); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .message.user .avatar { background: rgba(47, 129, 247, 0.15); }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .text {
      background: var(--bg-secondary);
      padding: 12px 16px;
      border-radius: 10px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .text {
      background: var(--accent);
      color: white;
    }

    .time {
      font-size: 11px;
      color: var(--text-secondary);
      padding: 0 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: 10px;
      width: fit-content;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typing 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    .input-area {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
    }

    .input-form {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 200px;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
    }

    .modal h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }

    .modal input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .modal input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal button {
      width: auto;
      padding: 0 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span>🤖</span>
      <span>NanoClaw Chatbot</span>
    </div>
    <div class="status" id="status">未配置</div>
  </div>

  <div class="messages" id="messages">
    <div class="empty">
      <span style="font-size: 48px;">💬</span>
      <p style="font-size: 18px; font-weight: 500;">开始对话</p>
      <span>基于 Claude AI 的智能助手</span>
    </div>
  </div>

  <div class="input-area">
    <form class="input-form" id="form">
      <textarea id="input" placeholder="输入消息... (Shift+Enter 换行)" rows="1"></textarea>
      <button type="submit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </form>
  </div>

  <div class="modal" id="apiKeyModal">
    <div class="modal-content">
      <h2>配置 API Key</h2>
      <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 14px;">
        请输入你的 Anthropic API Key<br>
        <a href="https://console.anthropic.com/" target="_blank" style="color: var(--accent);">获取 API Key →</a>
      </p>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
      <div class="modal-buttons">
        <button onclick="saveApiKey()">保存</button>
      </div>
    </div>
  </div>

  <script type="module">
    let apiKey = localStorage.getItem('anthropic_api_key');
    let messages = [];
    let isTyping = false;

    const $messages = document.getElementById('messages');
    const $form = document.getElementById('form');
    const $input = document.getElementById('input');
    const $status = document.getElementById('status');
    const $modal = document.getElementById('apiKeyModal');

    // 检查 API Key
    if (!apiKey) {
      $modal.style.display = 'flex';
    } else {
      $status.textContent = '已配置';
      $status.classList.add('ready');
    }

    window.saveApiKey = () => {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('anthropic_api_key', key);
        apiKey = key;
        $modal.style.display = 'none';
        $status.textContent = '已配置';
        $status.classList.add('ready');
      }
    };

    // 发送消息
    $form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = $input.value.trim();
      if (!text || !apiKey) return;

      // 添加用户消息
      addMessage('user', text);
      $input.value = '';
      $input.style.height = 'auto';

      // 显示打字指示器
      showTyping();

      try {
        // 调用 Claude API
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-3-5-haiku-20241022',
            max_tokens: 2048,
            system: `你是 NanoClaw Chatbot，一个专业、友好的 AI 助手。回答要简洁清晰，使用中文。当前时间：${new Date().toLocaleString('zh-CN')}`,
            messages: messages.slice(-20).map(m => ({ role: m.role, content: m.content }))
          })
        });

        hideTyping();

        if (!response.ok) {
          const error = await response.json();
          addMessage('assistant', `❌ 错误：${error.error?.message || '请求失败'}`);
          return;
        }

        const data = await response.json();
        const content = data.content[0].text;
        addMessage('assistant', content);

      } catch (error) {
        hideTyping();
        addMessage('assistant', `❌ 网络错误：${error.message}`);
      }
    });

    // 添加消息
    function addMessage(role, content) {
      messages.push({ role, content, timestamp: new Date() });

      // 清空空状态
      if ($messages.querySelector('.empty')) {
        $messages.innerHTML = '';
      }

      const $msg = document.createElement('div');
      $msg.className = `message ${role}`;
      $msg.innerHTML = `
        <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="content">
          <div class="text">${content}</div>
          <div class="time">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</div>
        </div>
      `;
      $messages.appendChild($msg);
      $messages.scrollTop = $messages.scrollHeight;
    }

    // 显示打字指示器
    function showTyping() {
      if (isTyping) return;
      isTyping = true;
      const $typing = document.createElement('div');
      $typing.className = 'message assistant';
      $typing.id = 'typing';
      $typing.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="content">
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      `;
      $messages.appendChild($typing);
      $messages.scrollTop = $messages.scrollHeight;
    }

    // 隐藏打字指示器
    function hideTyping() {
      isTyping = false;
      const $typing = document.getElementById('typing');
      if ($typing) $typing.remove();
    }

    // 自动调整 textarea 高度
    $input.addEventListener('input', () => {
      $input.style.height = 'auto';
      $input.style.height = $input.scrollHeight + 'px';
    });

    // Enter 发送，Shift+Enter 换行
    $input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        $form.dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
